<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Task Master</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="25" height="25" viewBox="0 0 24 24" fill="none">
            <path d="M8.5 12.2l2.1 2.1 5-5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="3.8" y="4" width="16.4" height="16" rx="5" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <div>
          <h1>Tasks</h1>
          <p>Your tasks here</p>
        </div>
      </div>

      <nav class="nav" aria-label="Task filters">
        <button class="nav-button active" data-view="all">
          <span class="nav-icon">☑</span>
          <span>Tasks</span>
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-button" data-view="active">
          <span class="nav-icon">◌</span>
          <span>Active</span>
          <span class="nav-count" id="count-active">0</span>
        </button>
        <button class="nav-button" data-view="completed">
          <span class="nav-icon">✓</span>
          <span>Completed</span>
          <span class="nav-count" id="count-completed">0</span>
        </button>
        <button class="nav-button" data-view="favorites">
          <span class="nav-icon">★</span>
          <span>Favorites</span>
          <span class="nav-count" id="count-favorites">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        Tip: use <strong>⌘/Ctrl + K</strong> to add a task, <strong>Esc</strong> to close the modal.
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-block">
          <h2 id="page-title">Tasks</h2>
          <p id="page-subtitle">Everything you need to do.</p>
        </div>

        <label class="search-wrap">
          <span class="sr-only">Search tasks</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm5.2-2.1 4.5 4.5" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
          </svg>
          <input class="search-input" id="search-input" type="search" placeholder="Search tasks" autocomplete="off" />
        </label>

        <select class="sort-select" id="sort-select" aria-label="Sort tasks">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="az">Name A–Z</option>
          <option value="za">Name Z–A</option>
        </select>

        <button class="add-button" id="open-add">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
          <span>New Task</span>
        </button>
      </header>

      <section class="task-list" id="task-list" aria-live="polite"></section>
    </main>
  </div>

  <nav class="bottom-tabs" aria-label="Mobile tabs">
    <button class="tab-button active" data-view="all">
      <svg viewBox="0 0 24 24" fill="none"><path d="M8.5 12.2l2.1 2.1 5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="4" width="16" height="16" rx="5" stroke="currentColor" stroke-width="2"/></svg>
      <span>Tasks</span>
    </button>
    <button class="tab-button" data-view="active">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/></svg>
      <span>Active</span>
    </button>
    <button class="tab-button" data-view="completed">
      <svg viewBox="0 0 24 24" fill="none"><path d="M7 12.5l3.1 3.1L17.5 8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Done</span>
    </button>
    <button class="tab-button" data-view="favorites">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 4.7l2.1 4.3 4.7.7-3.4 3.3.8 4.7-4.2-2.2-4.2 2.2.8-4.7-3.4-3.3 4.7-.7L12 4.7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      <span>Starred</span>
    </button>
  </nav>

  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">New Task</h3>
        <button class="icon-button" id="close-modal" aria-label="Close modal">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <path d="M7 7l10 10M17 7 7 17" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <form class="form" id="task-form">
        <input class="field" id="task-title-input" type="text" placeholder="Task name" autocomplete="off" maxlength="120" required />
        <textarea class="textarea" id="task-note-input" placeholder="Notes, details, or context" maxlength="600"></textarea>

        <div class="modal-actions">
          <button class="secondary-button" type="button" id="cancel-modal">Cancel</button>
          <button class="primary-button" type="submit" id="save-task">Add Task</button>
        </div>
      </form>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
